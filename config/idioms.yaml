# ===========================================================================
# Idiom configuration for Hansard monetary-idiom extraction pipeline
#
# Provenance
# ----------
# - "LIDIOMS"        : mechanically extracted from LIDIOMS english.ttl
#                      (http://lid.aksw.org), filtered to entries whose
#                      rdfs:label contains a UK monetary denomination.
# - "researcher"     : added by the research team from standard reference
#                      works (OED, Brewer's Dictionary of Phrase & Fable,
#                      Partridge). NOT in LIDIOMS. Listed explicitly so a
#                      reviewer can distinguish mechanical from manual
#                      selection.
# - "LIDIOMS-placebo": non-monetary idioms drawn from LIDIOMS for
#                      falsification / placebo tests.
#
# Classification
# --------------
# group: treatment   — denomination value is semantically load-bearing;
#                      the coin's cheapness/dearness IS the idiom's point.
# group: excluded    — denomination word is present but value is NOT the
#                      semantic mechanism (e.g. "guinea pig", "bad penny").
#                      Kept here for transparency; include: false.
# group: placebo     — no monetary denomination; null-signal control set.
#
# Paraphrase poles
# ----------------
# Each treatment idiom has two poles: trivial_pole and significant_pole.
# These are short phrases expressing the idiom's core meaning at different
# ends of a weight/significance dimension. The score_paraphrase metric is:
#
#   score = sim(context, trivial_pole) - sim(context, significant_pole)
#
# Poles are idiom-specific because each idiom occupies a distinct semantic
# neighbourhood. The only dimension that varies between poles is the
# intensity word; all other semantic content is held constant.
#
# pole_def_source: the dictionary entry used to derive the core meaning.
# Sources used:
#   Cambridge Advanced Learner's Dictionary & Thesaurus (cambridge.org)
#   Collins English Dictionary (collinsdictionary.com)
#   Dictionary.com (dictionary.com)
#   Merriam-Webster (merriam-webster.com)
#   Green's Dictionary of Slang (greensdictofslang.com)
#
# Each entry is pre-registered before running on the full corpus.
# ===========================================================================


# ===========================
#  TREATMENT — penny idioms
# ===========================
idioms:

  # --- LIDIOMS matches ---

  - phrase: "penny for your thoughts"
    denomination: [penny]
    group: treatment
    source: LIDIOMS
    notes: >
      Offering a trivially small sum for someone's opinion.
      Denomination value is directly load-bearing: the penny marks
      the offer as nominal. One of the most recognisable penny idioms.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary:
      'said when you want to know what another person is thinking'"
    trivial_pole: "a thought of negligible consequence"
    significant_pole: "a thought of considerable consequence"

  - phrase: "not have two pennies to rub together"
    denomination: [penny]
    group: treatment
    source: LIDIOMS
    notes: >
      Extreme poverty — not possessing even two of the smallest coins.
      Value-laden: the penny's smallness intensifies the poverty claim.
      LIDIOMS canonical form is "have two pennies to rub together";
      expanded here to capture the negated form that dominates in Hansard.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'to be very
      poor'; Collins: 'to have very little money'"
    trivial_pole: "possessing a negligible sum of money"
    significant_pole: "possessing a substantial sum of money"

  - phrase: "penny-pinching"
    denomination: [penny]
    group: excluded
    source: LIDIOMS
    notes: >
      Excessive frugality or miserliness — saving at the level of
      individual pennies. The penny here is generic small-money
      (interchangeable with "cent-pinching"); the idiom's meaning
      does not depend on the penny's specific purchasing power.
      EXCLUDED from treatment.
    include: false
    pole_def_source: "Cambridge Advanced Learner's Dictionary:
      'unwilling to spend money'"
    trivial_pole: "excessive reluctance to spend a negligible amount"
    significant_pole: "prudent reluctance to spend a substantial amount"

  # --- Researcher-supplemented penny idioms ---

  - phrase: "not worth a penny"
    denomination: [penny]
    group: treatment
    source: researcher
    notes: >
      Something of negligible value. Directly value-laden: the penny
      is the unit of (in)significance.
    include: true
    pole_def_source: "Collins English Dictionary: 'two a penny / ten a
      penny — not valuable or interesting because they are very common
      and easy to find'"
    trivial_pole: "of negligible worth"
    significant_pole: "of considerable worth"

  - phrase: "a pretty penny"
    denomination: [penny]
    group: treatment
    source: researcher
    notes: >
      Ironic/hyperbolic — means a surprisingly large sum. Value-laden:
      the humour depends on the penny normally being trivial.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'cost
      someone a pretty penny — to be very expensive'; Dictionary.com:
      'a considerable sum of money'"
    trivial_pole: "a negligible sum of money"
    significant_pole: "a considerable sum of money"

  - phrase: "penny packets"
    denomination: [penny]
    group: excluded
    source: researcher
    notes: >
      Small, inadequate, piecemeal amounts. Common in military and
      budget debates. The penny marks smallness/insufficiency in a
      generic sense — the idiom is about piecemeal scale, not the
      penny's monetary value. "Shilling packets" would mean the same.
      EXCLUDED from treatment.
    include: false
    pole_def_source: "Collins English Dictionary penny-related entries;
      general British parliamentary usage for piecemeal allocation"
    trivial_pole: "a meagre and negligible allocation"
    significant_pole: "a generous and substantial allocation"

  - phrase: "pennies in the pound"
    denomination: [penny, pound]
    group: treatment
    source: researcher
    notes: >
      Rate metaphor — recovering only a fraction of value. Value-laden
      when used as a general adequacy metaphor. Context-dependent: can
      be literal when discussing actual dividend/tax rates.
    include: true
    pole_def_source: "Cambridge Dictionary farthing entry (Hansard
      examples): general British financial idiom for fractional recovery"
    trivial_pole: "a negligible fraction of the full amount"
    significant_pole: "a substantial fraction of the full amount"

  - phrase: "ten a penny"
    denomination: [penny]
    group: treatment
    source: researcher
    notes: >
      Something extremely common and of little value (UK equivalent of
      "a dime a dozen"). Value-laden: the penny anchors the cheapness.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'be two/ten
      a penny — to be very common'; Collins: 'not valuable or interesting
      because they are very common and easy to find'"
    trivial_pole: "extremely common and of negligible worth"
    significant_pole: "rare and of considerable worth"

  - phrase: "penny dreadful"
    denomination: [penny]
    group: treatment
    source: researcher
    notes: >
      Originally a cheap sensational publication costing one penny.
      Extended to mean anything cheap and lurid. Value-laden: the
      penny marks the low cost and by extension low quality.
    include: true
    pole_def_source: "Dictionary.com: 'a cheap, sensational novel of
      adventure, crime, or violence'; Farlex Dictionary of Idioms:
      'a cheap paperback novel, typically characterized by melodrama'"
    trivial_pole: "of negligible cost and negligible quality"
    significant_pole: "of considerable cost and considerable quality"

  - phrase: "turn an honest penny"
    denomination: [penny]
    group: excluded
    source: researcher
    notes: >
      To earn money through legitimate work. The penny here is a
      generic stand-in for money/earnings — "turn an honest pound"
      or "turn an honest dollar" carries the same meaning. The
      idiom's force comes from "honest", not the denomination's value.
      EXCLUDED from treatment.
    include: false
    pole_def_source: "General British idiom; Cambridge Dictionary penny
      entry: 'the smallest amount of money possible'"
    trivial_pole: "to earn a negligible return through honest work"
    significant_pole: "to earn a substantial return through honest work"

  - phrase: "not a penny more"
    denomination: [penny]
    group: treatment
    source: researcher
    notes: >
      Refusing further payment or concession. Can be literal in price
      negotiation or idiomatic as emphatic refusal. Context-dependent.
    include: true
    pole_def_source: "Cambridge Dictionary penny entry: 'the smallest
      amount of money possible'; general emphatic refusal of further
      concession"
    trivial_pole: "refusing even a negligible further concession"
    significant_pole: "refusing a substantial further concession"

  - phrase: "penny wise pound foolish"
    denomination: [penny, pound]
    group: treatment
    source: researcher
    notes: >
      False economy — saving on small things while wasting on large.
      Value-laden: depends on the penny/pound VALUE ratio.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'extremely
      careful about small amounts of money and not careful enough about
      larger amounts'; Merriam-Webster: 'careful about small amounts of
      money but not about large amounts'"
    trivial_pole: "careful stewardship of a negligible sum"
    significant_pole: "careful stewardship of a substantial sum"

  - phrase: "in for a penny in for a pound"
    denomination: [penny, pound]
    group: treatment
    source: researcher
    notes: >
      Committing fully once started. Value-laden: the escalation from
      penny to pound relies on their value difference.
    include: true
    pole_def_source: "Collins English Dictionary: 'firmly committed to a
      particular course of action, even though it will probably cost a
      lot of money or use a lot of resources if you continue'"
    trivial_pole: "a negligible initial commitment"
    significant_pole: "a total and binding commitment"

  - phrase: "look after the pennies"
    denomination: [penny]
    group: treatment
    source: researcher
    notes: >
      From "look after the pennies and the pounds will look after
      themselves." Proverb about thrift. Value-laden: the penny's
      smallness is the point. Truncated to capture partial quotations
      common in parliamentary speech.
    include: true
    pole_def_source: "Cambridge Dictionary penny entry; general British
      proverb about accumulation of small savings"
    trivial_pole: "careful stewardship of negligible individual sums"
    significant_pole: "careful stewardship of substantial individual sums"


  # ===========================
  #  TREATMENT — shilling idioms
  # ===========================

  - phrase: "not the full shilling"
    denomination: [shilling]
    group: excluded
    source: researcher
    notes: >
      Someone not fully competent or intelligent — "not all there."
      The shilling here is a unit of completeness, not monetary value.
      "Not the full pound" or "not the full dollar" carries identical
      meaning. The idiom's mechanism is part/whole, not the shilling's
      purchasing power. EXCLUDED from treatment.
    include: false
    pole_def_source: "Green's Dictionary of Slang: 'not quite the full
      shilling — not very intelligent, slightly eccentric, odd'"
    trivial_pole: "lacking a negligible degree of full competence"
    significant_pole: "lacking a substantial degree of full competence"

  - phrase: "shilling a dozen"
    denomination: [shilling]
    group: treatment
    source: researcher
    notes: >
      Variant of "a dime a dozen" — very common and of little value.
      Value-laden: the shilling marks cheapness.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'be two/ten
      a penny — to be very common and therefore not valuable'
      (structural analogue)"
    trivial_pole: "extremely common and of negligible worth"
    significant_pole: "rare and of considerable worth"


  # ===========================
  #  TREATMENT — farthing idioms
  # ===========================

  - phrase: "not worth a farthing"
    denomination: [farthing]
    group: treatment
    source: researcher
    notes: >
      Of negligible or no value. Value-laden: the farthing (quarter
      penny) is the smallest possible unit of insignificance.
    include: true
    pole_def_source: "Collins English Dictionary: 'a former British bronze
      coin worth a quarter of an old penny'; Dictionary.com brass farthing:
      'something of little or no value'"
    trivial_pole: "of negligible worth"
    significant_pole: "of considerable worth"

  - phrase: "brass farthing"
    denomination: [farthing]
    group: treatment
    source: researcher
    notes: >
      Emphatic form — "not a brass farthing" / "not worth a brass
      farthing." Value-laden: brass (base metal) + farthing (smallest
      coin) = maximally worthless. Common in parliamentary record.
    include: true
    pole_def_source: "Dictionary.com: 'something of little or no value';
      Collins: 'his opinion isn't worth a brass farthing'"
    trivial_pole: "of the least possible worth"
    significant_pole: "of substantial worth"

  - phrase: "uttermost farthing"
    denomination: [farthing]
    group: treatment
    source: researcher
    notes: >
      Biblical origin (Matthew 5:26). Means paying every last fraction
      of a debt. Value-laden: the farthing marks the smallest possible
      increment of obligation.
    include: true
    pole_def_source: "Cambridge Dictionary farthing entry (Hansard
      example): 'thou shalt by no means come out thence, till thou hast
      paid the uttermost farthing'"
    trivial_pole: "a negligible residual obligation"
    significant_pole: "a complete and binding obligation"


  # ===========================
  #  TREATMENT — pound idioms
  # ===========================

  - phrase: "penny wise pound foolish"
    denomination: [penny, pound]
    group: treatment
    source: researcher
    notes: "Cross-listed under penny. See penny entry for details."
    include: false

  - phrase: "in for a penny in for a pound"
    denomination: [penny, pound]
    group: treatment
    source: researcher
    notes: "Cross-listed under penny. See penny entry for details."
    include: false


  # ===========================
  #  TREATMENT — guinea idioms
  # ===========================

  # No value-laden guinea idioms found in LIDIOMS or standard references.
  # "guinea pig" is the only guinea idiom and is value-inert (see below).
  # Guinea is excluded as a treatment denomination.


  # ===========================
  #  TREATMENT — crown idioms
  # ===========================

  # No value-laden crown idioms found in LIDIOMS or standard references.
  # "crown" in parliamentary text almost always refers to the monarchy,
  # not the coin. Excluded as a treatment denomination to avoid
  # systematic disambiguation failure.


  # ===========================
  #  EXCLUDED — value-inert
  # ===========================
  # Denomination word present but the coin's value is NOT the semantic
  # mechanism. Kept for transparency and audit trail.

  - phrase: "guinea pig"
    denomination: [guinea]
    group: excluded
    source: researcher
    notes: >
      Test subject. The "guinea" is etymologically linked to the coin
      but the meaning has zero relationship to purchasing power.
      Inflation cannot cause this phrase to connote more or less
      triviality. Also high false-positive rate from geographic
      "Guinea" references. EXCLUDED from treatment.
    include: false

  - phrase: "bad penny"
    denomination: [penny]
    group: excluded
    source: researcher
    notes: >
      From "turn up like a bad penny" — something unwanted that keeps
      reappearing. The mechanism is RECURRENCE of a counterfeit coin,
      not the penny's VALUE. No reason context should shift on a
      triviality axis with inflation. EXCLUDED from treatment.
    include: false

  - phrase: "spend a penny"
    denomination: [penny]
    group: excluded
    source: researcher
    notes: >
      Euphemism for using a toilet (historically coin-operated stalls).
      Meaning is completely detached from the penny's purchasing power.
      EXCLUDED from treatment.
    include: false

  - phrase: "take the king's shilling"
    denomination: [shilling]
    group: excluded
    source: researcher
    notes: >
      Accepting military service or obligation. The shilling is a
      historical artifact in the phrase, not a value marker. Will not
      drift with the shilling's real value. EXCLUDED from treatment.
    include: false

  - phrase: "the penny dropped"
    denomination: [penny]
    group: excluded
    source: LIDIOMS
    notes: >
      Sudden realisation — from coin-operated machines. The penny is
      mechanistic (a trigger) not a value marker. LIDIOMS definition
      is "a person very stupid" which is inaccurate; actual meaning is
      belated understanding. EXCLUDED from treatment.
    include: false

  - phrase: "pound of flesh"
    denomination: [pound]
    group: treatment
    source: researcher
    notes: >
      Demanding exact repayment regardless of consequences (from
      Shakespeare's Merchant of Venice), "pound" here refers
      to a unit of weight, not currency. 
    include: false 

  # ===========================
  #  PLACEBO — non-monetary idioms
  # ===========================
  # From LIDIOMS. Selected for: (a) likely to appear in parliamentary
  # debate, (b) no monetary denomination reference, (c) similar
  # register and vintage to treatment idioms. These should show NO
  # systematic relationship with any denomination's real value.

  - phrase: "tip of the iceberg"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "A small visible part of a much larger problem."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'a small, noticeable part of a problem, the total size of which is really much greater'"
    trivial_pole: "a minor visible sign of a negligible underlying issue"
    significant_pole: "a minor visible sign of a considerable underlying problem"

  - phrase: "throw a spanner in the works"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "To sabotage or disrupt a plan. British idiom, common in Hansard."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'to do something that prevents a plan or activity from succeeding'"
    trivial_pole: "a negligible disruption to a minor plan or activity"
    significant_pole: "a considerable disruption to an important plan or activity"

  - phrase: "the last straw"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "The final problem in a series that makes the situation unbearable."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'the last in a series of unpleasant events that finally makes you feel that you cannot continue to accept a bad situation'"
    trivial_pole: "a negligible final irritation in a minor series of inconveniences"
    significant_pole: "a considerable final burden in a serious series of difficulties"

  - phrase: "turn a blind eye"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: >
      To deliberately ignore something. Nelson attribution makes it
      common in UK parliamentary rhetoric.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'to ignore something that you know is wrong'"
    trivial_pole: "deliberate neglect of a negligible wrongdoing"
    significant_pole: "deliberate neglect of a considerable wrongdoing"

  - phrase: "hot potato"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "A controversial or sensitive issue. Very common in parliamentary debate."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'a situation or subject that is difficult to deal with and causes a lot of disagreement'"
    trivial_pole: "a matter causing negligible disagreement or difficulty"
    significant_pole: "a matter causing considerable disagreement or difficulty"

  - phrase: "back to square one"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "Starting over from the beginning."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'back to the beginning, because an attempt to do something has failed'"
    trivial_pole: "returning to the beginning after negligible prior effort"
    significant_pole: "returning to the beginning after considerable prior effort"

  - phrase: "bite the bullet"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "To endure a painful situation with courage. Common in policy debate."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'to force yourself to do something unpleasant or difficult'"
    trivial_pole: "accepting a negligible hardship with resignation"
    significant_pole: "accepting a considerable hardship with courage"

  - phrase: "lame duck"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: >
      An ineffective person or official. Originally British
      stock-exchange slang. Common in parliamentary usage.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'a person or organization that is in trouble and needs help'"
    trivial_pole: "a person or institution of negligible effectiveness or authority"
    significant_pole: "a person or institution of considerably diminished effectiveness or authority"

  - phrase: "a bitter pill to swallow"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "An unpleasant fact or situation that must be accepted."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'something that is very unpleasant but must be accepted'"
    trivial_pole: "a negligible unpleasantness that must be accepted"
    significant_pole: "a considerable unpleasantness that must be accepted"

  - phrase: "cut corners"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: >
      To do something in the cheapest or easiest way, sacrificing
      quality. NOTE: thematically adjacent to economy/cost but contains
      no denomination word.
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'to do something in the easiest, cheapest, or fastest way, often by ignoring rules or leaving something out'"
    trivial_pole: "making negligible reductions in quality or care"
    significant_pole: "making considerable reductions in quality or care"

  - phrase: "water under the bridge"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "Past events that are no longer relevant."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'used to say that something happened in the past and cannot now be changed'"
    trivial_pole: "a negligible past matter that can no longer be changed"
    significant_pole: "a considerable past matter that can no longer be changed"

  - phrase: "beat around the bush"
    denomination: []
    group: placebo
    source: LIDIOMS-placebo
    notes: "To avoid getting to the point. Common in parliamentary criticism."
    include: true
    pole_def_source: "Cambridge Advanced Learner's Dictionary: 'to avoid talking about what is important'"
    trivial_pole: "negligible evasion of a minor point"
    significant_pole: "considerable evasion of an important point"
